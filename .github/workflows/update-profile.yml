name: Update profile card

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - profile.config.json
      - assets/ascii.txt
      - scripts/update_profile.py
      - .github/workflows/update-profile.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh public GitHub stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USERNAME: omerscoskun
        run: python scripts/update_profile.py

      - name: Commit updated cards
        run: |
          if git diff --quiet -- README.md dark_mode.svg light_mode.svg; then
            echo "Generated profile files are already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md dark_mode.svg light_mode.svg
          git commit -m "chore: update profile stats"
          git push
